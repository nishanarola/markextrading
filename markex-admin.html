<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MARKEX — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#D4AF37; --gold-light:#F5D76E;
  --dark:#07090D; --dark2:#0E1117; --dark3:#161B22;
  --accent:#00E5A0; --red:#FF5555; --text:#C8CDD8; --white:#F5F7FA;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{ background:var(--dark); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

body::before{
  content:''; position:fixed; inset:0;
  background-image:linear-gradient(rgba(212,175,55,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(212,175,55,0.03) 1px,transparent 1px);
  background-size:50px 50px; pointer-events:none; z-index:0;
}

/* ── LOGIN SCREEN ── */
.login-screen{
  position:fixed; inset:0; z-index:100;
  display:flex; align-items:center; justify-content:center;
  background:var(--dark);
}

.login-box{
  background:var(--dark3); border:1px solid rgba(212,175,55,0.2);
  border-radius:24px; padding:48px 40px; width:100%; max-width:400px;
  text-align:center; position:relative; z-index:1;
}

.login-logo{
  font-family:'Bebas Neue',cursive; font-size:36px; color:var(--gold);
  letter-spacing:3px; margin-bottom:6px;
}

.login-sub{
  font-family:'Space Mono',monospace; font-size:10px; color:var(--accent);
  letter-spacing:3px; margin-bottom:36px;
}

.login-box input{
  width:100%; padding:16px 18px; background:var(--dark2);
  border:1px solid rgba(212,175,55,0.15); border-radius:12px;
  color:var(--white); font-size:15px; outline:none;
  font-family:'DM Sans',sans-serif; margin-bottom:14px; transition:0.3s;
}

.login-box input:focus{ border-color:var(--gold); }

.login-btn{
  width:100%; padding:16px; background:var(--gold); color:#000;
  border:none; border-radius:12px; font-family:'Bebas Neue',cursive;
  font-size:22px; letter-spacing:2px; cursor:pointer; transition:0.3s; margin-top:6px;
}

.login-btn:hover{ background:var(--gold-light); transform:translateY(-2px); }

.login-error{
  color:var(--red); font-family:'Space Mono',monospace; font-size:11px;
  margin-top:12px; display:none;
}

/* ── ADMIN PANEL ── */
.admin-panel{ display:none; position:relative; z-index:1; }

header{
  position:sticky; top:0; z-index:50;
  display:flex; justify-content:space-between; align-items:center;
  padding:16px 32px;
  background:rgba(7,9,13,0.95); backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(212,175,55,0.15);
}

.brand-name{ font-family:'Bebas Neue',cursive; font-size:24px; color:var(--gold); letter-spacing:2px; }
.brand-sub{ font-family:'Space Mono',monospace; font-size:10px; color:var(--accent); letter-spacing:3px; }

.logout-btn{
  font-family:'Space Mono',monospace; font-size:11px; letter-spacing:1px;
  padding:10px 20px; background:transparent; border:1px solid rgba(255,85,85,0.3);
  color:var(--red); border-radius:8px; cursor:pointer; transition:0.3s;
}
.logout-btn:hover{ background:rgba(255,85,85,0.1); }

main{ padding:32px; max-width:1300px; margin:0 auto; }

/* ── STATS ── */
.stats{ display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:32px; }

.stat{
  background:var(--dark2); border:1px solid rgba(212,175,55,0.1);
  border-radius:14px; padding:20px;
}

.stat-val{ font-family:'Bebas Neue',cursive; font-size:40px; color:var(--gold); line-height:1; }
.stat-label{ font-family:'Space Mono',monospace; font-size:10px; color:var(--text); letter-spacing:2px; margin-top:4px; }

/* ── UPLOAD AREA ── */
.upload-section{
  background:var(--dark3); border:1px solid rgba(212,175,55,0.12);
  border-radius:20px; padding:28px; margin-bottom:28px;
}

.section-title-sm{
  font-family:'Space Mono',monospace; font-size:11px; color:var(--accent);
  letter-spacing:3px; text-transform:uppercase; margin-bottom:20px;
}

.upload-drop{
  border:2px dashed rgba(212,175,55,0.25); border-radius:14px;
  padding:50px 20px; text-align:center; cursor:pointer; transition:0.3s;
  position:relative;
}

.upload-drop:hover, .upload-drop.dragover{
  border-color:var(--gold); background:rgba(212,175,55,0.04);
}

.upload-drop input[type=file]{
  position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%;
}

.upload-icon{ font-size:48px; margin-bottom:12px; }
.upload-text{ font-family:'Bebas Neue',cursive; font-size:26px; color:var(--white); letter-spacing:1px; }
.upload-sub{ font-size:13px; color:var(--text); margin-top:6px; }

/* Upload form fields */
.upload-fields{ display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:20px; }

.field-group{ display:flex; flex-direction:column; gap:6px; }
.field-label{ font-family:'Space Mono',monospace; font-size:10px; color:var(--accent); letter-spacing:2px; }

.field-group input,
.field-group select{
  padding:13px 16px; background:var(--dark2);
  border:1px solid rgba(212,175,55,0.15); border-radius:10px;
  color:var(--white); font-size:14px; outline:none; transition:0.3s;
  font-family:'DM Sans',sans-serif;
}

.field-group input:focus,
.field-group select:focus{ border-color:var(--gold); }

.field-group select option{ background:var(--dark3); }

/* Preview strip */
.preview-strip{ display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; }

.preview-thumb{
  width:80px; height:80px; border-radius:10px; object-fit:cover;
  border:2px solid rgba(212,175,55,0.3); position:relative;
}

.upload-submit{
  margin-top:20px; padding:14px 36px;
  background:var(--gold); color:#000; border:none;
  border-radius:10px; font-family:'Bebas Neue',cursive;
  font-size:20px; letter-spacing:2px; cursor:pointer; transition:0.3s;
}
.upload-submit:hover{ background:var(--gold-light); transform:translateY(-2px); }
.upload-submit:disabled{ opacity:0.5; cursor:not-allowed; transform:none; }

/* Progress bar */
.progress-bar-wrap{
  background:var(--dark2); border-radius:10px; height:8px;
  margin-top:14px; overflow:hidden; display:none;
}
.progress-bar{ height:100%; background:var(--gold); border-radius:10px; transition:width 0.3s; width:0%; }

/* ── GALLERY GRID ── */
.gallery-section{
  background:var(--dark3); border:1px solid rgba(212,175,55,0.12);
  border-radius:20px; padding:28px;
}

.gallery-toolbar{
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:20px; flex-wrap:wrap; gap:12px;
}

.filter-tabs{ display:flex; gap:8px; flex-wrap:wrap; }

.tab-btn{
  font-family:'Space Mono',monospace; font-size:10px; letter-spacing:2px;
  text-transform:uppercase; padding:8px 16px; border-radius:6px;
  border:1px solid rgba(212,175,55,0.2); background:transparent;
  color:var(--text); cursor:pointer; transition:0.3s;
}
.tab-btn:hover, .tab-btn.active{
  background:var(--gold); color:#000; border-color:var(--gold); font-weight:700;
}

.clear-btn{
  font-family:'Space Mono',monospace; font-size:10px; letter-spacing:1px;
  padding:8px 18px; border-radius:6px; border:1px solid rgba(255,85,85,0.3);
  background:transparent; color:var(--red); cursor:pointer; transition:0.3s;
}
.clear-btn:hover{ background:rgba(255,85,85,0.1); }

.admin-grid{
  display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr));
  gap:14px;
}

.admin-card{
  background:var(--dark2); border:1px solid rgba(212,175,55,0.08);
  border-radius:14px; overflow:hidden; transition:0.3s; position:relative;
}
.admin-card:hover{ border-color:rgba(212,175,55,0.3); transform:translateY(-4px); }

.admin-card img{
  width:100%; aspect-ratio:1/1; object-fit:cover; display:block;
}

.admin-card-info{ padding:10px 12px; }
.admin-card-caption{ font-size:12px; color:var(--white); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.admin-card-tag{
  display:inline-block; font-family:'Space Mono',monospace; font-size:9px;
  letter-spacing:1px; padding:2px 8px; border-radius:3px; margin-top:4px;
  background:rgba(212,175,55,0.1); color:var(--gold);
}

.admin-card-actions{
  display:flex; gap:6px; padding:0 12px 12px;
}

.btn-delete{
  flex:1; padding:7px; background:rgba(255,85,85,0.1);
  border:1px solid rgba(255,85,85,0.3); color:var(--red);
  border-radius:7px; font-size:12px; cursor:pointer; transition:0.3s;
  font-family:'Space Mono',monospace;
}
.btn-delete:hover{ background:rgba(255,85,85,0.25); }

.btn-view{
  flex:1; padding:7px; background:rgba(212,175,55,0.1);
  border:1px solid rgba(212,175,55,0.3); color:var(--gold);
  border-radius:7px; font-size:12px; cursor:pointer; transition:0.3s;
  font-family:'Space Mono',monospace;
}
.btn-view:hover{ background:rgba(212,175,55,0.2); }

.empty-state{
  grid-column:1/-1; text-align:center; padding:60px 20px;
  font-family:'Space Mono',monospace; font-size:12px; opacity:0.4;
}

/* Toast */
.toast{
  position:fixed; bottom:24px; right:24px; z-index:999;
  background:var(--dark3); border-radius:12px; padding:14px 22px;
  border:1px solid rgba(212,175,55,0.2);
  font-family:'Space Mono',monospace; font-size:12px;
  transform:translateY(80px); opacity:0; transition:0.4s; pointer-events:none;
}
.toast.show{ transform:translateY(0); opacity:1; }
.toast.success{ border-color:rgba(0,229,160,0.4); color:var(--accent); }
.toast.error{ border-color:rgba(255,85,85,0.4); color:var(--red); }

/* Lightbox */
.lightbox{
  display:none; position:fixed; inset:0; z-index:2000;
  background:rgba(0,0,0,0.95); backdrop-filter:blur(10px);
  justify-content:center; align-items:center;
}
.lightbox.open{ display:flex; }
.lightbox img{ max-width:90vw; max-height:90vh; border-radius:16px; }
.lightbox-close{
  position:fixed; top:20px; right:24px; font-size:36px;
  color:var(--gold); cursor:pointer; background:none; border:none; z-index:2001;
}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .stats{ grid-template-columns:repeat(2,1fr); }
  .upload-fields{ grid-template-columns:1fr; }
  main{ padding:20px; }
  .gallery-toolbar{ flex-direction:column; align-items:flex-start; }
}

@media(max-width:600px){
  main{ padding:12px; }
  header{ padding:12px 16px; }
  .brand-name{ font-size:18px; }
  .brand-sub{ font-size:9px; }
  .logout-btn{ padding:8px 14px; font-size:10px; }

  .stats{ grid-template-columns:1fr 1fr; gap:10px; }
  .stat{ padding:14px; }
  .stat-val{ font-size:32px; }

  .upload-section, .gallery-section{ padding:18px 14px; border-radius:14px; }
  .upload-drop{ padding:32px 16px; }
  .upload-icon{ font-size:36px; }
  .upload-text{ font-size:20px; }
  .upload-submit{ width:100%; padding:14px; font-size:18px; }

  .admin-grid{ grid-template-columns:repeat(2,1fr); gap:10px; }
  .admin-card-info{ padding:8px 10px; }
  .admin-card-caption{ font-size:11px; }
  .admin-card-actions{ padding:0 10px 10px; gap:4px; }
  .btn-delete, .btn-view{ font-size:10px; padding:6px; }

  .filter-tabs{ gap:6px; }
  .tab-btn{ padding:6px 12px; font-size:9px; }
  .clear-btn{ padding:6px 14px; font-size:9px; }

  .login-box{ padding:36px 22px; margin:16px; }
  .login-logo{ font-size:28px; }
}
</style>
</head>
<body>

<!-- ── LOGIN SCREEN ── -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">MARKEX TRADING</div>
    <div class="login-sub">ADMIN PANEL</div>
    <input type="text" id="loginUser" placeholder="Username" autocomplete="off">
    <input type="password" id="loginPass" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">LOGIN</button>
    <div class="login-error" id="loginError">❌ Wrong username or password</div>
  </div>
</div>

<!-- ── ADMIN PANEL ── -->
<div class="admin-panel" id="adminPanel">

  <header>
    <div>
      <div class="brand-name">MARKEX TRADING</div>
      <div class="brand-sub">ADMIN — GALLERY MANAGER</div>
    </div>
    <button class="logout-btn" onclick="doLogout()">LOGOUT</button>
  </header>

  <main>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <div class="stat-val" id="statTotal">0</div>
        <div class="stat-label">TOTAL PHOTOS</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="statResults">0</div>
        <div class="stat-label">TRADE RESULTS</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="statStudents">0</div>
        <div class="stat-label">STUDENT SUCCESS</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="statLive">0</div>
        <div class="stat-label">LIVE / CHARTS</div>
      </div>
    </div>

    <!-- Upload -->
    <div class="upload-section">
      <div class="section-title-sm">📤 UPLOAD NEW PHOTOS</div>

      <div class="upload-drop" id="dropZone">
        <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(this.files)">
        <div class="upload-icon">🖼️</div>
        <div class="upload-text">PHOTOS YAHAN DROP KARO</div>
        <div class="upload-sub">ya click karo to browse — JPG, PNG, WEBP support</div>
      </div>

      <div class="preview-strip" id="previewStrip"></div>

      <div class="upload-fields">
        <div class="field-group">
          <label class="field-label">CAPTION (description)</label>
          <input type="text" id="photoCaption" placeholder="e.g. XAUUSD +340 pips profit">
        </div>
        <div class="field-group">
          <label class="field-label">CATEGORY</label>
          <select id="photoTag">
            <option value="results">📈 Trade Results</option>
            <option value="students">🎓 Student Success</option>
            <option value="live">🎥 Live Sessions</option>
            <option value="charts">📊 Charts</option>
          </select>
        </div>
      </div>

      <div class="progress-bar-wrap" id="progressWrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <button class="upload-submit" id="uploadBtn" onclick="uploadPhotos()">
        ⬆ UPLOAD TO GALLERY
      </button>
    </div>

    <!-- Gallery Management -->
    <div class="gallery-section">
      <div class="gallery-toolbar">
        <div class="filter-tabs">
          <button class="tab-btn active" onclick="filterAdmin('all',this)">ALL</button>
          <button class="tab-btn" onclick="filterAdmin('results',this)">RESULTS</button>
          <button class="tab-btn" onclick="filterAdmin('students',this)">STUDENTS</button>
          <button class="tab-btn" onclick="filterAdmin('live',this)">LIVE</button>
          <button class="tab-btn" onclick="filterAdmin('charts',this)">CHARTS</button>
        </div>
        <button class="clear-btn" onclick="clearAll()">🗑 CLEAR ALL</button>
      </div>

      <div class="admin-grid" id="adminGrid"></div>
    </div>

  </main>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="document.getElementById('lightbox').classList.remove('open')">
  <button class="lightbox-close">×</button>
  <img id="lightboxImg" src="" alt="">
</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────
//  CONFIG — AA BADLO
// ─────────────────────────────────────────────
const ADMIN_USER = 'markex';       // Username
const ADMIN_PASS = 'admin@2025';   // Password — potanu rakho!
const STORAGE_KEY = 'markex_gallery';

// ─────────────────────────────────────────────
//  LOGIN
// ─────────────────────────────────────────────
function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  if (u === ADMIN_USER && p === ADMIN_PASS) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    renderAdmin('all');
    updateStats();
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginPass').value = '';
  }
}

function doLogout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('adminPanel').style.display = 'none';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
}

// ─────────────────────────────────────────────
//  STORAGE
// ─────────────────────────────────────────────
function getPhotos() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function savePhotos(photos) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(photos));
}

// ─────────────────────────────────────────────
//  FILE HANDLING
// ─────────────────────────────────────────────
let pendingFiles = [];

function handleFiles(files) {
  pendingFiles = Array.from(files);
  const strip = document.getElementById('previewStrip');
  strip.innerHTML = '';
  pendingFiles.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.createElement('img');
      img.src = e.target.result;
      img.className = 'preview-thumb';
      img.title = file.name;
      strip.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
}

// Drag and drop
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});

// ─────────────────────────────────────────────
//  UPLOAD
// ─────────────────────────────────────────────
function uploadPhotos() {
  if (!pendingFiles.length) { showToast('Pehla photo select karo!', 'error'); return; }

  const caption = document.getElementById('photoCaption').value.trim() || 'MARKEX Trading';
  const tag     = document.getElementById('photoTag').value;
  const btn     = document.getElementById('uploadBtn');

  btn.disabled = true;
  btn.textContent = 'UPLOADING...';

  const progressWrap = document.getElementById('progressWrap');
  const progressBar  = document.getElementById('progressBar');
  progressWrap.style.display = 'block';
  progressBar.style.width = '0%';

  const photos = getPhotos();
  let done = 0;

  pendingFiles.forEach((file, i) => {
    const reader = new FileReader();
    reader.onload = e => {
      photos.push({
        id:      Date.now() + i,
        url:     e.target.result,  // base64 — koi server nahi joiye!
        caption: caption,
        tag:     tag,
        date:    new Date().toLocaleDateString('en-IN')
      });
      done++;
      progressBar.style.width = Math.round((done / pendingFiles.length) * 100) + '%';

      if (done === pendingFiles.length) {
        savePhotos(photos);
        renderAdmin('all');
        updateStats();
        // Reset
        pendingFiles = [];
        document.getElementById('previewStrip').innerHTML = '';
        document.getElementById('photoCaption').value = '';
        document.getElementById('fileInput').value = '';
        btn.disabled = false;
        btn.textContent = '⬆ UPLOAD TO GALLERY';
        setTimeout(() => { progressWrap.style.display = 'none'; progressBar.style.width = '0%'; }, 800);
        showToast(`✅ ${done} photo(s) gallery ma add thaya!`, 'success');

        // Reset filter to all
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('.tab-btn').classList.add('active');
      }
    };
    reader.readAsDataURL(file);
  });
}

// ─────────────────────────────────────────────
//  RENDER ADMIN GRID
// ─────────────────────────────────────────────
let currentFilter = 'all';

function renderAdmin(filter) {
  currentFilter = filter;
  const photos = getPhotos();
  const filtered = filter === 'all' ? photos : photos.filter(p => p.tag === filter);
  const grid = document.getElementById('adminGrid');

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state">Aa category ma koi photo nathi.<br>Upar thi upload karo.</div>`;
    return;
  }

  grid.innerHTML = filtered.map(photo => `
    <div class="admin-card" id="card_${photo.id}">
      <img src="${photo.url}" alt="${photo.caption}" loading="lazy"
           onerror="this.src='https://via.placeholder.com/300x300/161B22/D4AF37?text=IMG'">
      <div class="admin-card-info">
        <div class="admin-card-caption" title="${photo.caption}">${photo.caption}</div>
        <span class="admin-card-tag">${tagLabel(photo.tag)}</span>
      </div>
      <div class="admin-card-actions">
        <button class="btn-view" onclick="viewPhoto('${photo.url}')">👁 VIEW</button>
        <button class="btn-delete" onclick="deletePhoto(${photo.id})">🗑 DEL</button>
      </div>
    </div>
  `).join('');
}

function filterAdmin(filter, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAdmin(filter);
}

function deletePhoto(id) {
  if (!confirm('Aa photo delete karvu che?')) return;
  const photos = getPhotos().filter(p => p.id !== id);
  savePhotos(photos);
  renderAdmin(currentFilter);
  updateStats();
  showToast('Photo deleted', 'error');
}

function clearAll() {
  if (!confirm('BADHA photos delete karva che? Aa undo nahi thay!')) return;
  savePhotos([]);
  renderAdmin('all');
  updateStats();
  showToast('Gallery cleared', 'error');
}

function viewPhoto(url) {
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('open');
}

// ─────────────────────────────────────────────
//  STATS
// ─────────────────────────────────────────────
function updateStats() {
  const photos = getPhotos();
  document.getElementById('statTotal').textContent    = photos.length;
  document.getElementById('statResults').textContent  = photos.filter(p=>p.tag==='results').length;
  document.getElementById('statStudents').textContent = photos.filter(p=>p.tag==='students').length;
  document.getElementById('statLive').textContent     = photos.filter(p=>p.tag==='live'||p.tag==='charts').length;
}

function tagLabel(tag) {
  return {results:'RESULT', students:'STUDENT', live:'LIVE', charts:'CHART'}[tag] || tag.toUpperCase();
}

// ─────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────
let toastTimer;
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
}

// Enter key on login
document.getElementById('loginUser').addEventListener('keydown', e => {
  if(e.key === 'Enter') document.getElementById('loginPass').focus();
});
</script>
