<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gallery — MARKEX TRADING</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#D4AF37; --gold-light:#F5D76E;
  --dark:#07090D; --dark2:#0E1117; --dark3:#161B22;
  --accent:#00E5A0; --red:#FF5555; --text:#C8CDD8; --white:#F5F7FA;
}
*{ margin:0; padding:0; box-sizing:border-box; }
html{ scroll-behavior:smooth; }
body{ background:var(--dark); color:var(--text); font-family:'DM Sans',sans-serif; overflow-x:hidden; }

body::before{
  content:''; position:fixed; inset:0;
  background-image:linear-gradient(rgba(212,175,55,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(212,175,55,0.04) 1px,transparent 1px);
  background-size:60px 60px; pointer-events:none; z-index:0;
}

/* ── NAV ── */
nav{
  position:fixed; top:0; left:0; right:0; z-index:50;
  display:flex; justify-content:space-between; align-items:center;
  padding:18px 60px;
  background:rgba(7,9,13,0.92); backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(212,175,55,0.12);
}

.logo{
  display:flex; align-items:center; gap:12px;
  text-decoration:none; color:var(--gold);
  font-family:'Bebas Neue',cursive; font-size:30px; letter-spacing:2px;
}
.logo img{ width:40px; border-radius:50%; }

.nav-links{ display:flex; list-style:none; gap:28px; align-items:center; }
.nav-links a{
  text-decoration:none; color:var(--text);
  font-family:'Space Mono',monospace; font-size:12px; letter-spacing:1px; transition:0.3s;
}
.nav-links a:hover{ color:var(--gold); }
.nav-links a.active{ color:var(--gold); border-bottom:2px solid var(--gold); padding-bottom:2px; }

.nav-btn{
  background:var(--gold); color:#000 !important; padding:10px 22px;
  font-weight:700; clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
}

/* Hamburger */
.hamburger-wrap{
  display:none; position:fixed; top:16px; right:20px; z-index:1000;
}
.hamburger{
  display:flex; flex-direction:column; gap:5px;
  cursor:pointer; padding:8px; background:none; border:none;
}
.hamburger span{
  display:block; width:26px; height:2px;
  background:var(--gold); border-radius:2px; transition:0.35s;
}
.hamburger.open span:nth-child(1){ transform:translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2){ opacity:0; }
.hamburger.open span:nth-child(3){ transform:translateY(-7px) rotate(-45deg); }

/* Mobile overlay */
.mobile-overlay{
  display:none; position:fixed; inset:0;
  background:rgba(7,9,13,0.98); z-index:999;
  flex-direction:column; justify-content:center; align-items:center; gap:40px;
}
.mobile-overlay.open{ display:flex; }
.mobile-overlay a{
  text-decoration:none; color:var(--text);
  font-family:'Space Mono',monospace; font-size:18px; letter-spacing:2px; text-transform:uppercase; transition:0.3s;
}
.mobile-overlay a:hover{ color:var(--gold); }
.mobile-overlay .nav-btn{ clip-path:none; padding:14px 40px; font-size:15px; border-radius:4px; margin-top:10px; }

/* ── PAGE HERO ── */
.page-hero{
  padding:150px 60px 80px;
  text-align:center;
  position:relative; z-index:1;
  background:linear-gradient(180deg, rgba(212,175,55,0.06) 0%, transparent 100%);
}

.page-label{
  font-family:'Space Mono',monospace; color:var(--accent);
  letter-spacing:4px; font-size:11px; margin-bottom:16px;
}

.page-title{
  font-family:'Bebas Neue',cursive; font-size:90px;
  color:var(--white); line-height:0.9;
}
.page-title span{ color:var(--gold); }

.page-desc{
  max-width:550px; margin:20px auto 0;
  line-height:1.8; font-size:16px; color:var(--text);
}

/* ── GALLERY BODY ── */
.gallery-body{
  padding:20px 60px 100px;
  position:relative; z-index:1;
}

/* Filter tabs */
.gallery-filters{
  display:flex; flex-wrap:wrap; gap:10px;
  justify-content:center; margin-bottom:40px;
}

.filter-btn{
  font-family:'Space Mono',monospace; font-size:11px; letter-spacing:2px;
  text-transform:uppercase; padding:11px 24px; border-radius:8px;
  border:1px solid rgba(212,175,55,0.2); background:transparent;
  color:var(--text); cursor:pointer; transition:0.3s;
}
.filter-btn:hover{ border-color:var(--gold); color:var(--gold); }
.filter-btn.active{
  background:var(--gold); color:#000; border-color:var(--gold); font-weight:700;
}

/* Gallery grid */
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
}

.gallery-item{
  position:relative; border-radius:16px; overflow:hidden;
  border:1px solid rgba(212,175,55,0.1);
  cursor:pointer; transition:0.4s;
  aspect-ratio:1/1; background:var(--dark3);
}
.gallery-item:hover{ transform:translateY(-6px); border-color:rgba(212,175,55,0.4); box-shadow:0 20px 50px rgba(0,0,0,0.5); }
.gallery-item:hover .gallery-overlay{ opacity:1; }
.gallery-item:hover img{ transform:scale(1.07); }

.gallery-item img{
  width:100%; height:100%; object-fit:cover; transition:0.4s; display:block;
}

.gallery-overlay{
  position:absolute; inset:0;
  background:linear-gradient(transparent 30%, rgba(7,9,13,0.88) 100%);
  display:flex; flex-direction:column; justify-content:flex-end;
  padding:18px; opacity:0; transition:0.35s;
}

.gallery-tag-badge{
  display:inline-block; font-family:'Space Mono',monospace;
  font-size:9px; letter-spacing:2px; text-transform:uppercase;
  padding:4px 10px; border-radius:4px; margin-bottom:7px;
  background:rgba(212,175,55,0.18); color:var(--gold);
  width:fit-content;
}

.gallery-caption{
  font-size:13px; color:var(--white); font-weight:600; line-height:1.4;
}

.gallery-zoom{
  position:absolute; top:12px; right:12px;
  width:34px; height:34px; border-radius:50%;
  background:rgba(212,175,55,0.9); color:#000;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; font-weight:bold;
}

/* Empty state */
.gallery-empty{
  grid-column:1/-1; text-align:center; padding:80px 20px;
  font-family:'Space Mono',monospace; font-size:13px; opacity:0.5; line-height:2;
}

/* ── LIGHTBOX ── */
.lightbox{
  display:none; position:fixed; inset:0; z-index:2000;
  background:rgba(0,0,0,0.96); backdrop-filter:blur(12px);
  justify-content:center; align-items:center; padding:20px;
}
.lightbox.open{ display:flex; }

.lightbox-inner{ position:relative; max-width:920px; width:100%; text-align:center; }

.lightbox-img{
  max-width:100%; max-height:82vh;
  border-radius:18px; border:1px solid rgba(212,175,55,0.2);
  box-shadow:0 40px 120px rgba(0,0,0,0.8);
}

.lightbox-close{
  position:fixed; top:20px; right:26px;
  font-size:34px; color:var(--gold); cursor:pointer;
  background:none; border:none; z-index:2001; transition:0.3s; line-height:1;
}
.lightbox-close:hover{ color:var(--white); transform:scale(1.2); }

.lightbox-caption{
  font-family:'Space Mono',monospace; font-size:12px;
  color:var(--text); margin-top:18px; letter-spacing:1px;
}

.lightbox-counter{
  font-family:'Space Mono',monospace; font-size:10px;
  color:var(--gold); margin-top:8px; letter-spacing:2px;
}

.lightbox-nav{
  position:fixed; top:50%; transform:translateY(-50%);
  background:rgba(212,175,55,0.15); border:1px solid rgba(212,175,55,0.35);
  color:var(--gold); font-size:26px; width:50px; height:50px;
  border-radius:50%; cursor:pointer; display:flex;
  align-items:center; justify-content:center; transition:0.3s; z-index:2001;
}
.lightbox-nav:hover{ background:rgba(212,175,55,0.3); }
.lightbox-prev{ left:16px; }
.lightbox-next{ right:16px; }

/* ── FOOTER ── */
footer{
  border-top:1px solid rgba(212,175,55,0.12);
  padding:40px; text-align:center; position:relative; z-index:1;
}
footer p{ font-family:'Space Mono',monospace; font-size:11px; opacity:0.4; }

/* ── RESPONSIVE ── */
@media(max-width:1200px){
  .gallery-grid{ grid-template-columns:repeat(3,1fr); gap:16px; }
}

@media(max-width:1024px){
  nav{ padding:16px 20px; }
  .nav-links{ display:none; }
  .hamburger-wrap{ display:block; }
  .page-hero{ padding:130px 24px 60px; }
  .page-title{ font-size:64px; }
  .gallery-body{ padding:20px 24px 80px; }
  .gallery-grid{ grid-template-columns:repeat(3,1fr); gap:14px; }
  .filter-btn{ padding:9px 18px; font-size:10px; }
}

@media(max-width:768px){
  .page-title{ font-size:52px; }
  .gallery-grid{ grid-template-columns:repeat(2,1fr); gap:12px; }
  .filter-btn{ padding:9px 18px; font-size:10px; }
}

@media(max-width:600px){
  nav{ padding:14px 16px; }
  .logo{ font-size:20px; }
  .logo img{ width:28px; }
  .hamburger-wrap{ top:12px; right:14px; }

  .page-hero{ padding:110px 16px 40px; }
  .page-title{ font-size:44px; }
  .page-desc{ font-size:14px; }

  .gallery-body{ padding:14px 14px 60px; }
  .gallery-grid{ grid-template-columns:repeat(2,1fr); gap:10px; }
  .gallery-item{ border-radius:12px; }

  .gallery-filters{ gap:8px; margin-bottom:24px; }
  .filter-btn{ padding:8px 12px; font-size:9px; letter-spacing:1px; }

  .lightbox-nav{ display:none; }
  .lightbox-img{ max-height:72vh; border-radius:10px; }
  .lightbox-close{ font-size:28px; top:14px; right:16px; }
  .lightbox-caption{ font-size:11px; margin-top:12px; }

  footer{ padding:24px 16px; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="logo">
    <img src="D:\WhatsApp Image 2026-05-10 at 12.02.43 PM.jpeg" alt="Logo" onerror="this.style.display='none'">
    MARKEX TRADING
  </a>
  <ul class="nav-links">
    <li><a href="index.html#features">WHY US</a></li>
    <li><a href="index.html#courses">COURSES</a></li>
    <li><a href="gallery.html" class="active">GALLERY</a></li>
    <li><a href="index.html#pricing">PRICING</a></li>
    <li><a href="index.html#contact" class="nav-btn">START NOW</a></li>
  </ul>
</nav>

<!-- HAMBURGER -->
<div class="hamburger-wrap">
  <button class="hamburger" id="hamburger" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </button>
</div>

<!-- MOBILE OVERLAY -->
<div class="mobile-overlay" id="mobile-overlay">
  <a href="index.html#features" class="nav-link">WHY US</a>
  <a href="index.html#courses" class="nav-link">COURSES</a>
  <a href="gallery.html" class="nav-link">GALLERY</a>
  <a href="index.html#pricing" class="nav-link">PRICING</a>
  <a href="index.html#contact" class="nav-btn nav-link">START NOW</a>
</div>

<!-- PAGE HERO -->
<div class="page-hero">
  <div class="page-label">PROOF OF WORK</div>
  <div class="page-title">TRADING <span>GALLERY</span></div>
  <p class="page-desc">Real results. Real students. Real profits. Aa badhu j MARKEX Trading community na live results che.</p>
</div>

<!-- GALLERY BODY -->
<div class="gallery-body">

  <!-- Filters -->
  <div class="gallery-filters">
    <button class="filter-btn active" onclick="filterGallery('all',this)">🔥 ALL</button>
    <button class="filter-btn" onclick="filterGallery('results',this)">📈 TRADE RESULTS</button>
    <button class="filter-btn" onclick="filterGallery('students',this)">🎓 STUDENT SUCCESS</button>
    <button class="filter-btn" onclick="filterGallery('live',this)">🎥 LIVE SESSIONS</button>
    <button class="filter-btn" onclick="filterGallery('charts',this)">📊 CHARTS</button>
  </div>

  <!-- Grid -->
  <div class="gallery-grid" id="galleryGrid"></div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <button class="lightbox-nav lightbox-prev" onclick="lightboxNav(-1)">‹</button>
  <button class="lightbox-nav lightbox-next" onclick="lightboxNav(1)">›</button>
  <div class="lightbox-inner">
    <img class="lightbox-img" id="lightboxImg" src="" alt="">
    <div class="lightbox-caption" id="lightboxCaption"></div>
    <div class="lightbox-counter" id="lightboxCounter"></div>
  </div>
</div>

<footer>
  <p>© MARKEX TRADING — All Rights Reserved</p>
</footer>

<script>
// ── HAMBURGER ──
const hamburger = document.getElementById('hamburger');
const overlay   = document.getElementById('mobile-overlay');

hamburger.addEventListener('click', () => {
  const isOpen = overlay.classList.toggle('open');
  hamburger.classList.toggle('open', isOpen);
  document.body.style.overflow = isOpen ? 'hidden' : '';
});

document.querySelectorAll('#mobile-overlay .nav-link').forEach(link => {
  link.addEventListener('click', () => {
    overlay.classList.remove('open');
    hamburger.classList.remove('open');
    document.body.style.overflow = '';
  });
});

// ── GALLERY ──
const STORAGE_KEY = 'markex_gallery';

function getPhotos() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

let currentFilter = 'all';
let lightboxIndex = 0;
let filteredPhotos = [];

const TAG_LABELS = { results:'TRADE RESULT', students:'STUDENT SUCCESS', live:'LIVE SESSION', charts:'CHART SETUP' };

function tagLabel(tag){ return TAG_LABELS[tag] || tag.toUpperCase(); }

function updateStats() {
  const p = getPhotos();
  document.getElementById('sAll').textContent      = p.length;
  document.getElementById('sResults').textContent  = p.filter(x=>x.tag==='results').length;
  document.getElementById('sStudents').textContent = p.filter(x=>x.tag==='students').length;
  document.getElementById('sLive').textContent     = p.filter(x=>x.tag==='live').length;
  document.getElementById('sCharts').textContent   = p.filter(x=>x.tag==='charts').length;
}

function renderGallery(filter) {
  currentFilter = filter;
  const all = getPhotos();
  filteredPhotos = filter === 'all' ? all : all.filter(p => p.tag === filter);
  const grid = document.getElementById('galleryGrid');

  if (!filteredPhotos.length) {
    grid.innerHTML = `<div class="gallery-empty">
      ${all.length === 0
        ? '📂 Abhi koi photo nathi.<br>Admin panel thi photos upload karo.'
        : '📂 Aa category ma koi photo nathi.'}
    </div>`;
    return;
  }

  grid.innerHTML = filteredPhotos.map((photo, i) => `
    <div class="gallery-item" onclick="openLightbox(${i})">
      <img src="${photo.url}" alt="${photo.caption}" loading="lazy"
           onerror="this.src='https://via.placeholder.com/400x400/161B22/D4AF37?text=Photo'">
      <div class="gallery-overlay">
        <div class="gallery-tag-badge">${tagLabel(photo.tag)}</div>
        <div class="gallery-caption">${photo.caption}</div>
      </div>
      <div class="gallery-zoom">⤢</div>
    </div>
  `).join('');
}

function filterGallery(filter, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGallery(filter);
}

// ── LIGHTBOX ──
function openLightbox(index) {
  lightboxIndex = index;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function updateLightbox() {
  const photo = filteredPhotos[lightboxIndex];
  document.getElementById('lightboxImg').src           = photo.url;
  document.getElementById('lightboxCaption').textContent = photo.caption;
  document.getElementById('lightboxCounter').textContent = `${lightboxIndex + 1} / ${filteredPhotos.length}`;
}

function lightboxNav(dir) {
  lightboxIndex = (lightboxIndex + dir + filteredPhotos.length) % filteredPhotos.length;
  updateLightbox();
}

document.addEventListener('keydown', e => {
  if (document.getElementById('lightbox').classList.contains('open')) {
    if (e.key === 'Escape')      closeLightbox();
    if (e.key === 'ArrowRight')  lightboxNav(1);
    if (e.key === 'ArrowLeft')   lightboxNav(-1);
  }
});

document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
});

// Auto-refresh when admin uploads
window.addEventListener('storage', e => {
  if (e.key === STORAGE_KEY) { renderGallery(currentFilter); }
});

// Init
renderGallery('all');
</script>
</body>
</html>
